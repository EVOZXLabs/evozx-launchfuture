<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Details | EVOZX Launch Future</title>
    <link rel="stylesheet" href="./css/app.css">
    <style>
        .nav-logo { height: 40px; width: auto; object-fit: contain; }
        
        /* Layout Utama Terpusat */
        .page-container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        
        /* Styling tambahan agar card terlihat premium */
        .token-detail-card { border: 1px solid var(--border); padding: 30px; border-radius: 8px; }
    </style>
</head>
<body>

    <header>
        <nav class="container navbar">
            <div class="brand">
                <img src="./images/logo.png" alt="EVOZX Logo" class="nav-logo">
                <span style="color: var(--gold); font-weight: bold; margin-left: 10px;">EVOZX Launch Future</span>
            </div>
            <div class="nav-links">
                <a href="./index.html">Home</a>
                <a href="./launch.html">Launch</a>
            </div>
            <button id="connectBtn" class="btn btn-gold">Connect Wallet</button>
        </nav>
    </header>

    <main class="page-container">
        
        <div class="page-header" style="text-align: center; margin-bottom: 40px;">
            <h1>Token Details</h1>
            <p style="color: var(--muted);">View real-time information for the selected token.</p>
        </div>

        <section class="card token-detail-card">
            <div id="tokenDetail">
                <div style="text-align: center; padding: 40px;">
                    <p style="color: var(--muted);">Loading token data...</p>
                </div>
            </div>
        </section>

        <div style="text-align: center; margin-top: 30px;">
            <a href="./index.html" class="btn btn-dark">Back to Home</a>
        </div>

    </main>

    <footer style="margin-top: 80px; padding: 40px 0; border-top: 1px solid var(--border); text-align: center;">
        <div class="container footer-content">
            <div class="footer-brand">EVOZX Launch Future</div>
            <span class="footer-copyright">© 2026 EVOZXLabs. All rights reserved.</span>
        </div>
    </footer>

    <script type="module" src="./js/token.js"></script>
</body>
</html>
