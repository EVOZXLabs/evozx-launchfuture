<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tokens | EVOZX Launch Future</title>
    <meta name="description" content="View and manage your deployed tokens on EVOZ.">
    <link rel="stylesheet" href="./css/app.css">
    <style>
        .nav-logo { height: 40px; width: auto; object-fit: contain; }
        
        /* Layout Utama Terpusat */
        .page-container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        
        /* Card Styling */
        .token-card { background: rgba(0,0,0,0.2); border: 1px solid var(--border); padding: 20px; border-radius: 8px; transition: 0.3s; }
        .token-card:hover { border-color: var(--gold); }
    </style>
</head>
<body>

    <header>
        <nav class="container navbar">
            <div class="brand">
                <img src="./images/logo.png" alt="EVOZX Logo" class="nav-logo">
                <span style="color: var(--gold); font-weight: bold; margin-left: 10px;">EVOZX Launch Future</span>
            </div>
            <div class="nav-links">
                <a href="./index.html">Home</a>
                <a href="./launch.html">Launch</a>
                <a href="#" class="active">Dashboard</a>
            </div>
            <button id="connectBtn" class="btn btn-gold">Connect Wallet</button>
        </nav>
    </header>

    <main class="page-container">
        
        <div class="page-header" style="text-align: center; margin-bottom: 40px;">
            <h1>My Tokens</h1>
            <p style="color: var(--muted);">Manage and view the details of your deployed smart contracts.</p>
        </div>

        <div id="tokenList" class="grid" style="grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));">
            <div class="card" style="grid-column: 1 / -1; text-align: center; padding: 60px; border: 1px dashed var(--border);">
                <p style="color: var(--muted);">Connect your wallet to view your deployed tokens.</p>
            </div>
        </div>

    </main>

    <footer style="margin-top: 80px; padding: 40px 0; border-top: 1px solid var(--border); text-align: center;">
        <div class="container footer-content">
            <div class="footer-brand">EVOZX Launch Future</div>
            <span class="footer-copyright">© 2026 EVOZXLabs. All rights reserved.</span>
        </div>
    </footer>

    <script type="module" src="./js/dashboard.js"></script>
</body>
</html>
